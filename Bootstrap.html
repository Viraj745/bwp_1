<!DOCTYPE html>
<html>
<head>
<title>Flipkart Style Layout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.navbar{
    background:#2874f0;
}

.search-box{
    width:400px;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">

<a class="navbar-brand fw-bold">Flipkart</a>

<input class="form-control search-box" type="search" placeholder="Search for products">

<button class="btn btn-light ms-3">Login</button>

</div>
</nav>


<!-- Categories -->
<div class="container mt-4">

<div class="row text-center">

<div class="col">Mobiles</div>
<div class="col">Fashion</div>
<div class="col">Electronics</div>
<div class="col">Home</div>
<div class="col">Appliances</div>
<div class="col">Travel</div>

</div>

</div>


<!-- Products -->
<div class="container mt-5">

<div class="row">

<div class="col-md-3">
<div class="card">

<img src="https://m.media-amazon.com/images/I/710as3-Py1L._SL1500_.jpg" class="card-img-top">

<div class="card-body">
<h5>Omen Laptop</h5>
<p>₹99,999</p>
<a href="omen.html" class="btn btn-primary">Buy Now</a>
</div>

</div>
</div>


<div class="col-md-3">
<div class="card">

<img src="https://m.media-amazon.com/images/I/71JGCn1z1TL._SL1500_.jpg" class="card-img-top">

<div class="card-body">
<h5>Iphone</h5>
<p>₹1,50,000</p>
<a href="Iphone.html" class="btn btn-primary">Buy Now</a>
</div>

</div>
</div>


<div class="col-md-3">
<div class="card">

<img src="https://m.media-amazon.com/images/I/71BYpCGHsYL._SL1500_.jpg" class="card-img-top">

<div class="card-body">
<h5>4k TV</h5>
<p>₹50,000</p>
<a href="4K.html" class="btn btn-primary">Buy Now</a>
</div>

</div>
</div>


<div class="col-md-3">
<div class="card">

<img src="https://m.media-amazon.com/images/I/71RJCexaxiL._SL1500_.jpg" class="card-img-top">

<div class="card-body">
<h5>Headphones</h5>
<p>₹12,999</p>
<a href="Headphones.html" class="btn btn-primary">Buy Now</a>
</div>

</div>
</div>

</div>

</div>

</body>
</html>
